spring.application.name=Ecometa 
 
# ─── MongoDB Configuration (replaces MySQL) ───────────────────────────────────
# Set MONGODB_URI as environment variable on Render.com
# Local dev fallback:
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=ecometa

# ─── E-Mail (Gmail SMTP) ──────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USER}
spring.mail.password=${GMAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
 
# ─── Certificate PDF Storage ──────────────────────────────────────────────────
certificate.directory=./certificates
 
# ─── Security / JWT ───────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
 
# ─── CORS ─────────────────────────────────────────────────────────────────────
# Set FRONTEND_URL on Render dashboard to your Vercel URL
frontend.url=${FRONTEND_URL}

 
# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
